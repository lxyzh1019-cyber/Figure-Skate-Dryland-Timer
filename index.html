<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimmer Hub V7</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: #f1f5f9; padding: 15px; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; max-width: 550px; margin: 0 auto; border: 1px solid #334155; }
        .day-badge { background: #38bdf8; color: #0f172a; padding: 6px 18px; border-radius: 25px; font-weight: 800; }
        .display { font-size: 7rem; font-weight: 900; margin: 5px 0; color: #38bdf8; line-height: 1; }
        .exercise-highlight { background: #334155; padding: 15px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #fbbf24; min-height: 130px; }
        .current-ex { font-size: 1.8rem; font-weight: bold; color: #fbbf24; display: block; }
        .cue { font-size: 1.1rem; color: #94a3b8; font-style: italic; margin-top: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .start-btn { background: #22c55e; color: white; padding: 20px; flex: 2; border-radius: 12px; font-size: 1.5rem; font-weight: bold; border: none; cursor: pointer; }
        .pause-btn { background: #64748b; color: white; padding: 20px; flex: 1; border-radius: 12px; font-size: 1.2rem; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div id="workout-ui">
            <span class="day-badge" id="current-day-name">---</span>
            <h2 id="workout-title">Loading...</h2>
            <div class="display" id="timer-display">--</div>
            <div class="exercise-highlight">
                <span class="current-ex" id="current-ex-name">Ready?</span>
                <div class="cue" id="coaching-cue">Tap start to begin</div>
            </div>
            <div class="btn-group">
                <button class="start-btn" id="main-btn" onclick="startSession()">START</button>
                <button class="pause-btn" id="pause-btn" onclick="togglePause()" style="display:none">PAUSE</button>
            </div>
        </div>
    </div>

<script>
    const speech = window.speechSynthesis;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let session = null, running = false, paused = false;

    // DATA FROM PDF: Exercises, Coaching Cues, and Tempo Logic
    const trainingData = {
        "Monday": { title: "Power Day A", work: 30, rest: 10, roundRest: 35, rounds: 4, ex: [
            {n: "Box Jump", c: "Push off like the pool wall! Max drive"},
            {n: "Squat Jump", c: "Land softly. Quiet feet = absorption"},
            {n: "Bosu Squat", c: "3s controlled descent. Knees out", t: {type: "cycle", up: 1, hold: 0, down: 3}},
            {n: "Lateral Bound", c: "Stillness IS training. Hold landing", t: {type: "cycle", up: 0, hold: 2, down: 1}}
        ]},
        "Tuesday": { title: "Core Day A", work: 30, rest: 15, roundRest: 45, rounds: 3, ex: [
            {n: "Ball Prone Stroke Sim", c: "Shoulders DOWN. Lat works"},
            {n: "Dead Bug", c: "Lower back pressed to floor"},
            {n: "Wide-Grip Pull-Up", c: "4s lowering phase. No swinging", t: {type: "cycle", up: 1, hold: 0, down: 4}},
            {n: "Band Single-Arm Pull", c: "Torso STILL. Resist rotation"}
        ]},
        "Saturday": { title: "Core C", work: 25, rest: 15, roundRest: 45, rounds: 3, ex: [
            {n: "Superman Hold", c: "Squeeze glutes and upper back", t: {type: "static", hold: 5, relax: 5}},
            {n: "Streamline Wall Hold", c: "Press back, arms, and head against wall", t: {type: "static", hold: 10, relax: 5}},
            {n: "Glute Bridge Slow", c: "Hips fully extended. No arching", t: {type: "cycle", up: 2, hold: 2, down: 2}},
            {n: "W-Raise", c: "Pull blades together and DOWN", t: {type: "cycle", up: 1, hold: 2, down: 1}}
        ]}
    };

    function init() {
        const d = new Date().getDay();
        const today = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][d];
        document.getElementById('current-day-name').innerText = today;
        session = trainingData[today] || trainingData["Monday"]; // Default to Mon for demo
        document.getElementById('workout-title').innerText = session.title;
    }

    function speak(m, slow = false) {
        speech.cancel();
        const u = new SpeechSynthesisUtterance(m);
        u.rate = slow ? 0.5 : 0.8; // Use 0.5 for movement indicator to match speed
        speech.speak(u);
    }

    function beep(freq = 440) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
    }

    async function startSession() {
        if(running) return; running = true;
        document.getElementById('main-btn').style.display = 'none';
        document.getElementById('pause-btn').style.display = 'block';
        speak("I am strong. I am fast. Get ready.");
        await wait(4000);

        for (let r = 1; r <= session.rounds; r++) {
            for (let i = 0; i < session.ex.length; i++) {
                const ex = session.ex[i];
                const next = session.ex[i+1] || (r < session.rounds ? session.ex[0] : null);

                // WORK PHASE
                updateUI(ex.n, ex.c, session.work);
                speak("Go. " + ex.n);
                await countdown(session.work, "work", ex);

                // REST PHASE
                updateUI("Rest", "Break and breathe", session.rest);
                if (next) {
                    speak("Break and breathe. Get ready for " + next.n + ". Watch out: " + next.c);
                }
                await countdown(session.rest, "rest", next);
            }
            if (r < session.rounds) {
                speak("Congratulations, round " + r + " complete. " + (session.rounds - r) + " rounds to go. Long rest.");
                updateUI("Round Rest", "Great job!", session.roundRest);
                await countdown(session.roundRest, "round-rest", session.ex[0]);
            }
        }
        speak("Training complete. Recovery is training.");
        resetUI();
    }

    function countdown(sec, mode, data) {
        return new Promise(resolve => {
            let t = sec;
            const timer = setInterval(() => {
                if (paused) return;
                t--;
                document.getElementById('timer-display').innerText = t;

                // Rest logic: Call out next exercise 3s before start
                if(mode === "rest" && t === 3 && data) { speak("Get ready."); }

                // Movement Pace logic
                if(mode === "work" && data.t && t > 3) {
                    const elapsed = sec - t - 1;
                    if (data.t.type === "static") {
                        const cycle = data.t.hold + data.t.relax;
                        const pos = elapsed % cycle;
                        if (pos === 0) speak("Hold", true);
                        if (pos === data.t.hold) speak("Relax", true);
                    } else {
                        const cycle = data.t.up + data.t.hold + data.t.down;
                        const pos = elapsed % cycle;
                        if (pos === 0) speak("Uuuuuuup", true);
                        else if (pos === data.t.up) speak("Hooooold", true);
                        else if (pos === (data.t.up + data.t.hold)) speak("Doooooown", true);
                    }
                }

                // Restore Beep Indicator for last 3 seconds
                if(t <= 3 && t > 0) beep(t === 1 ? 880 : 440);

                if(t <= 0) { clearInterval(timer); resolve(); }
            }, 1000);
        });
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    function togglePause() { paused = !paused; speak(paused ? "Paused" : "Resuming"); }
    function updateUI(n, c, t) { document.getElementById('current-ex-name').innerText = n; document.getElementById('coaching-cue').innerText = c; document.getElementById('timer-display').innerText = t; }
    function resetUI() { running = false; document.getElementById('main-btn').style.display = 'block'; document.getElementById('pause-btn').style.display = 'none'; init(); }
    init();
</script>
</body>
</html>
