<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛸ Jen · Land Training Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gochi+Hand&family=Caveat:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef9ef;
    --bg2: #fff4db;
    --paper: #fffdf5;
    --paper-line: #e8dfc3;
    --ink: #2a2320;
    --ink-light: #6b5d4f;
    --jess: #6fb1fc;
    --jess-deep: #4a8fd6;
    --accent-orange: #ff7b54;
    --accent-yellow: #ffd166;
    --accent-green: #95d5b2;
    --accent-pink: #ff9eb5;
    --accent-purple: #c3aed6;
    --red-flag: #d64545;
    --rest-blue: #b8d8f0;
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Patrick Hand', 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(111, 177, 252, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255, 158, 181, 0.08) 0%, transparent 40%);
    color: var(--ink);
    min-height: 100vh;
    padding: 1rem;
    font-size: 1.15rem;
  }

  h1, h2, h3 {
    font-family: 'Gochi Hand', 'Caveat', cursive;
    font-weight: 400;
    letter-spacing: 0.5px;
    margin: 0;
  }

  .wrap { max-width: 580px; margin: 0 auto; }

  .header { text-align: center; padding: 0.5rem 0 1rem; }
  .header h1 { font-size: 2.6rem; color: var(--jess-deep); margin-bottom: 0.2rem; }
  .header .sub { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--ink-light); }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 24px;
    padding: 2rem;
    max-width: 520px;
    box-shadow: 8px 8px 0 var(--ink);
    text-align: center;
  }

  .modal h2 {
    font-size: 2.2rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .modal p {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink-light);
    margin-bottom: 1.5rem;
  }

  .modal-day-buttons {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .modal-day-btn {
    font-family: 'Patrick Hand', sans-serif;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 0.6rem 0.2rem;
    border: 3px solid var(--ink);
    border-radius: var(--radius-sm);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--ink);
  }

  .modal-day-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }

  .modal-day-btn.selected {
    background: var(--jess);
    color: white;
    border-width: 4px;
  }

  .modal-day-btn.today {
    background: var(--accent-yellow);
    color: var(--ink);
  }

  .modal-day-btn.rest {
    opacity: 0.5;
  }

  .modal-confirm-msg {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--jess-deep);
    margin-bottom: 1rem;
    min-height: 1.5rem;
  }

  .modal-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    padding: 1rem 1.5rem;
    border: 3px solid var(--ink);
    border-radius: var(--radius-sm);
    background: var(--accent-green);
    color: var(--ink);
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--ink);
    transition: all 0.1s;
  }

  .modal-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .modal-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0 var(--ink);
  }

  .modal-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Main page (hidden until modal closes) */
  .page-content {
    display: none;
  }

  .page-content.show {
    display: block;
  }

  .day-tabs {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    margin-bottom: 1rem; background: var(--paper); border: 2px solid var(--ink);
    border-radius: var(--radius); padding: 6px; box-shadow: 3px 3px 0 var(--ink);
  }
  .day-tab {
    text-align: center; padding: 0.45rem 0.2rem; border-radius: var(--radius-sm);
    cursor: pointer; font-family: 'Patrick Hand', sans-serif; font-size: 0.95rem;
    color: var(--ink-light); border: 2px solid transparent;
    transition: all 0.15s; user-select: none;
  }
  .day-tab:hover { background: var(--bg2); }
  .day-tab.today { background: var(--accent-yellow); color: var(--ink); }
  .day-tab.active { background: var(--jess); color: white; border-color: var(--ink); font-weight: bold; }
  .day-tab.rest { opacity: 0.6; }

  .card {
    background: var(--paper); border: 3px solid var(--ink); border-radius: 24px;
    padding: 1.5rem; box-shadow: 5px 5px 0 var(--ink); margin-bottom: 1rem;
  }

  .day-header {
    text-align: center; border-bottom: 3px dashed var(--paper-line);
    padding-bottom: 1rem; margin-bottom: 1rem;
  }
  .day-badge {
    display: inline-block; background: var(--jess); color: white;
    padding: 0.4rem 1.2rem; border-radius: 50px; border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink); font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 0.6rem;
  }
  .day-title { font-size: 2rem; color: var(--ink); margin: 0.2rem 0 0.1rem; }
  .day-subtitle { font-family: 'Caveat', cursive; font-size: 1.3rem; color: var(--ink-light); }

  .brief { padding: 0.5rem 0; }
  .brief-section {
    background: var(--bg); border: 2px solid var(--ink); border-radius: var(--radius-sm);
    padding: 0.8rem 1rem; margin-bottom: 0.8rem; box-shadow: 2px 2px 0 var(--ink);
  }
  .brief-section ul { list-style: none; padding: 0; margin: 0.3rem 0 0; font-size: 1.05rem; }
  .brief-section li { padding: 0.15rem 0; line-height: 1.4; }
  .brief-section li::before { content: "• "; color: var(--jess-deep); font-weight: bold; }
  .brief-section .ex-line { display: flex; justify-content: space-between; gap: 0.5rem; }
  .brief-section .ex-line .ex-meta {
    color: var(--ink-light); font-family: 'Caveat', cursive; font-size: 1.1rem;
  }
  .readiness {
    background: var(--bg2); border: 2px dashed var(--paper-line);
    border-radius: var(--radius-sm); padding: 0.8rem; margin-bottom: 0.8rem; text-align: center;
  }
  .readiness-buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; justify-content: center; }
  .readiness-buttons button {
    flex: 1; font-family: 'Nunito', sans-serif; font-weight: 700;
    padding: 0.5rem; border: 2px solid var(--ink); border-radius: var(--radius-sm);
    background: var(--paper); box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer; font-size: 0.95rem;
  }
  .readiness-buttons button.selected { background: var(--jess); color: white; }
  .readiness-buttons button:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }

  .timer-zone { text-align: center; padding: 1rem 0; transition: background 0.3s ease; }
  .timer-zone.work       { background: linear-gradient(180deg, transparent, rgba(255, 209, 102, 0.18)); }
  .timer-zone.rest       { background: linear-gradient(180deg, transparent, rgba(184, 216, 240, 0.35)); }
  .timer-zone.warmup     { background: linear-gradient(180deg, transparent, rgba(149, 213, 178, 0.25)); }
  .timer-zone.roundrest  { background: linear-gradient(180deg, transparent, rgba(195, 174, 214, 0.3)); }
  .timer-zone.sideswitch { background: linear-gradient(180deg, transparent, rgba(255, 158, 181, 0.25)); }

  .timer {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 6.5rem;
    line-height: 1; color: var(--ink); letter-spacing: -3px; transition: color 0.2s;
  }
  .timer.urgent { color: var(--accent-orange); }

  .progress {
    display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;
    margin-top: 0.5rem; font-family: 'Caveat', cursive; font-size: 1.3rem;
    color: var(--ink-light);
  }
  .progress .chip {
    background: var(--bg2); border: 2px solid var(--ink); border-radius: 50px;
    padding: 0.1rem 0.7rem; box-shadow: 2px 2px 0 var(--ink);
  }
  .progress .chip.phase { background: var(--jess); color: white; }

  .exercise {
    background: var(--bg); border: 2px solid var(--ink); border-radius: var(--radius);
    padding: 1rem 1.2rem; margin: 1rem 0; box-shadow: 3px 3px 0 var(--ink);
    min-height: 130px;
  }
  .ex-name {
    font-family: 'Gochi Hand', cursive; font-size: 1.7rem;
    color: var(--ink); margin-bottom: 0.3rem;
  }
  .ex-detail {
    font-family: 'Caveat', cursive; font-size: 1.3rem;
    color: var(--jess-deep); margin-bottom: 0.5rem;
  }
  .ex-cue {
    font-family: 'Patrick Hand', sans-serif; font-size: 1.1rem;
    color: var(--ink); line-height: 1.4;
  }
  .ex-redflag {
    margin-top: 0.7rem; padding-top: 0.5rem; border-top: 2px dotted var(--paper-line);
    font-family: 'Patrick Hand', sans-serif; font-size: 1rem;
    color: var(--red-flag); line-height: 1.4;
  }
  .ex-redflag::before { content: "🔴 "; }
  .ex-hydrate {
    margin-top: 0.6rem; padding-top: 0.5rem; border-top: 2px dotted var(--paper-line);
    text-align: center; font-family: 'Caveat', cursive; font-size: 1.4rem;
    color: var(--jess-deep);
  }

  .upnext {
    text-align: center; font-family: 'Caveat', cursive; font-size: 1.3rem;
    color: var(--ink-light); margin: 0.5rem 0; min-height: 1.5rem;
  }
  .upnext .label { color: var(--ink-light); }
  .upnext .name { color: var(--jess-deep); font-weight: 700; }

  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
  .btn {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.1rem;
    padding: 0.85rem 0.7rem; border: 3px solid var(--ink); border-radius: var(--radius-sm);
    box-shadow: 4px 4px 0 var(--ink); cursor: pointer; color: var(--ink);
    transition: transform 0.08s, box-shadow 0.08s; letter-spacing: 0.5px;
  }
  .btn:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent-green); flex: 1 1 100%; font-size: 1.4rem; padding: 1rem; }
  .btn-pause   { background: var(--accent-yellow); flex: 1; min-width: 90px; }
  .btn-skip    { background: var(--paper); flex: 1; font-size: 0.95rem; min-width: 90px; }
  .btn-form    { background: var(--accent-purple); flex: 1; font-size: 0.95rem; min-width: 90px; }
  .btn-done    { background: var(--accent-orange); color: white; flex: 1 1 100%; font-size: 1.4rem; padding: 1rem; }
  .btn-stop    { background: var(--accent-pink); flex: 1; font-size: 0.9rem; min-width: 80px; }

  .reflect { text-align: center; padding: 1rem 0; }
  .reflect h3 { font-size: 1.6rem; color: var(--accent-orange); margin-bottom: 0.5rem; }
  .reflect-buttons { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.8rem; }
  .reflect-buttons button {
    flex: 1; font-family: 'Patrick Hand', sans-serif; font-size: 1.1rem;
    padding: 0.9rem 0.5rem; border: 2px solid var(--ink); border-radius: var(--radius-sm);
    background: var(--paper); box-shadow: 3px 3px 0 var(--ink); cursor: pointer;
  }
  .reflect-buttons button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .reflect-thanks {
    margin-top: 1rem; font-family: 'Gochi Hand', cursive;
    font-size: 1.4rem; color: var(--accent-green);
  }

  .rest-day { text-align: center; padding: 2rem 1rem; }
  .rest-day .emoji { font-size: 4rem; margin-bottom: 0.5rem; }
  .rest-day h2 { font-size: 2.4rem; color: var(--accent-orange); margin-bottom: 0.5rem; }
  .rest-day p { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--ink-light); }
  .rest-day ul {
    text-align: left; max-width: 320px; margin: 1rem auto 0;
    font-size: 1.1rem; list-style: none; padding: 0;
  }
  .rest-day li { padding: 0.3rem 0; }

  .schedule {
    background: var(--paper); border: 2px solid var(--ink); border-radius: var(--radius);
    padding: 1rem; box-shadow: 3px 3px 0 var(--ink); margin-bottom: 1rem;
  }
  .schedule summary {
    cursor: pointer; font-family: 'Gochi Hand', cursive; font-size: 1.4rem;
    color: var(--ink); list-style: none; user-select: none;
  }
  .schedule summary::before { content: "▸ "; transition: transform 0.2s; display: inline-block; }
  .schedule[open] summary::before { content: "▾ "; }
  .schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 0.8rem; }
  .sch-cell {
    background: var(--bg); border: 2px solid var(--ink); border-radius: var(--radius-sm);
    padding: 0.4rem 0.2rem; text-align: center; font-size: 0.85rem; line-height: 1.2;
  }
  .sch-cell .day { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-light); }
  .sch-cell .name { font-family: 'Patrick Hand', sans-serif; color: var(--ink); }
  .sch-cell.today { background: var(--accent-yellow); border-width: 3px; }
  .schedule .note {
    margin-top: 0.7rem; font-family: 'Caveat', cursive; font-size: 1.05rem;
    color: var(--ink-light); line-height: 1.3;
  }

  .status {
    text-align: center; font-family: 'Caveat', cursive; font-size: 1.4rem;
    color: var(--jess-deep); margin-bottom: 0.5rem; min-height: 1.6rem;
  }

  .mantra {
    text-align: center; font-family: 'Gochi Hand', cursive; font-size: 1.3rem;
    color: var(--accent-orange); margin: 0.5rem 0 0.8rem; padding: 0.5rem;
    background: var(--bg2); border-radius: var(--radius-sm);
    border: 2px dashed var(--paper-line);
  }

  @media (max-width: 480px) {
    body { font-size: 1.05rem; padding: 0.6rem; }
    .timer { font-size: 5rem; }
    .day-title { font-size: 1.6rem; }
    .header h1 { font-size: 2rem; }
    .day-tab { font-size: 0.8rem; padding: 0.35rem 0.1rem; }
    .sch-cell { font-size: 0.7rem; }
    .btn { font-size: 1rem; padding: 0.7rem 0.4rem; }
    .modal { padding: 1.5rem; }
    .modal h2 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- Day picker modal (shows on load) -->
<div class="modal-overlay show" id="modal-overlay">
  <div class="modal">
    <h2>Which day are you training?</h2>
    <p>Pick your workout below</p>
    
    <div class="modal-day-buttons" id="modal-days"></div>
    
    <div class="modal-confirm-msg" id="modal-msg"></div>
    
    <button class="modal-btn" id="modal-confirm-btn" disabled>
      Let's Go! 💪
    </button>
  </div>
</div>

<!-- Main page (hidden until day is selected) -->
<div class="page-content" id="page-content">
  <div class="wrap">
    <div class="header">
      <h1>⛸ Land Training</h1>
      <div class="sub">Jen · 7-day skating plan · Week 2+</div>
    </div>

    <div class="day-tabs" id="day-tabs"></div>

    <details class="schedule">
      <summary>This week's plan</summary>
      <div class="schedule-grid" id="schedule-grid"></div>
      <div class="note">
        Mon/Wed/Fri: power circuits · Tue: core anti-rotation · Thu: recovery (after school) ·
        Sat: stretch + hip rotators · Sun: full rest.
      </div>
    </details>

    <div class="card" id="main-card"></div>
  </div>
</div>

<script>
/* ============================================================
   PLAN DATA
   ============================================================ */

const MANTRA = "I am STRONG. I am SHARP. I can SKATE THIS.";

const WARMUP = {
  name: "Movement Prep",
  duration: 180,
  steps: [
    "Jumping Jacks · 30 seconds",
    "Arm Circles forward + back · 20 each",
    "Leg Swings front/back + side · 10 each",
    "Hip Circles · 10 each direction"
  ]
};

const HARD_EXERCISES = new Set([
  "Pull-Up", "Box Jump", "Skater Jump", "Single-Leg Land",
  "Lateral Bound", "Box Jump or Skater Jump", "Bosu Single-Leg Squat",
  "Single-Leg RDL", "Copenhagen Plank", "Squat Jump", "Split Jump"
]);

const MIN_REST = 12;
const SIDE_SWITCH_BUFFER = 5;

const E = (name, work, rest, cue, redFlag, opts = {}) => ({
  name, work, rest: Math.max(rest, MIN_REST), cue, redFlag, ...opts
});
const ER = (name, repsDetail, rest, cue, redFlag, opts = {}) => ({
  name, byReps: true, repsDetail, rest: Math.max(rest, MIN_REST), cue, redFlag, ...opts
});

const PLAN = {
  monday: {
    title: "Power Day A",
    subtitle: "Jump Power + Glute Stability",
    badge: "POWER",
    equipment: ["Plyo box", "Resistance band (above-knee loop)", "Step or platform"],
    warmup: WARMUP,
    circuits: [
      { name: "Circuit A — Jump Power", rounds: 4, roundRest: 35, exercises: [
        E("Box Jump", 30, 10,
          "Imagine the blade push-off at jump takeoff. Fast ground contact — touch and go.",
          "Knee caves on landing — stop immediately, lower box height."),
        E("Single-Leg Land", 30, 10,
          "Stick each landing 2s before reset. Knee tracks over second toe. Hip stays level.",
          "Knee caves AND passes toe on landing — revert to two-foot landing.",
          { eachSide: true }),
        E("Split Jump", 30, 10,
          "Drive both arms up at takeoff. Land softly with slight knee bend. Alternate front leg each rep.",
          "Landing stiff-legged with no knee bend — reduce height, find soft landing first."),
        E("Skater Jump", 30, 10,
          "Full push from takeoff leg. Landing leg slightly bent. Arms swing for balance.",
          "Still unstable after 2s on landing leg — shorten distance before adding power.")
      ]},
      { name: "Circuit B — Glute Stability", rounds: 2, roundRest: 35, exercises: [
        ER("Glute Bridge", "12 reps · 2s up / 2s hold / 2s down", 15,
           "Squeeze glutes at top — count each rep aloud. Do NOT arch lower back.",
           "Lower back arches instead of glutes firing — drop to 8 reps, reset glute activation."),
        ER("Crab Walk", "20 steps each direction · band above knees", 15,
           "Glutes warm now — feel the resistance clearly. Stay low throughout, don't stand up.",
           "Standing upright or knees caving — re-squat low before continuing."),
        ER("Calf Raise", "15 reps · 2s up / 1s hold / 2s down", 15,
           "Full range — heel fully below step level between every rep. Never cut range short.",
           "Half-range only — stop, reset, full range from heel-below-step."),
        ER("Band Lateral Walk", "20 steps each direction · band above knees", 15,
           "Band stays taut between every step — feet never fully together. Stay low.",
           "Band goes slack or knees collapse inward — re-anchor stance, reduce step size.")
      ]}
    ]
  },
  tuesday: {
    title: "Core Day A",
    subtitle: "Anti-Rotation + Pull Strength",
    badge: "CORE",
    equipment: ["Bosu ball", "Pull-up bar", "Resistance band (anchored at hip)"],
    warmup: null,
    circuits: [
      { name: "Interval Core Circuit", rounds: 3, roundRest: 45, exercises: [
        E("Bosu Single-Leg Stand", 30, 15,
          "Fix gaze on one point. Slow blink if wobbling — never look down at the board.",
          "Cannot hold 5s — switch to floor single-leg stand without Bosu first.",
          { eachSide: true }),
        E("Side Plank", 20, 15,
          "Ear, shoulder, hip, ankle in ONE straight line. Feel obliques — not lower back.",
          "Hip drops more than 5cm — drop to knee version immediately.",
          { eachSide: true }),
        E("Pull-Up", 30, 15,
          "Depress shoulders BEFORE pulling. Lower in 4 full seconds — count aloud every rep.",
          "Swinging or shrugging — switch to dead hang hold for remaining time."),
        ER("Pallof Press", "12 reps each side · 2s hold at full extension", 15,
           "Press out, arms straight, hold 2s, return. Core resists rotation throughout. Hips stay square.",
           "Hip rotates with arm — reduce band tension, re-anchor feet wider.")
      ]}
    ]
  },
  wednesday: {
    title: "Power Day B",
    subtitle: "Jump + Landing Simulation",
    badge: "POWER",
    equipment: ["Plyo box", "Bosu ball", "Sandbag (light)"],
    warmup: WARMUP,
    circuits: [
      { name: "Circuit A — Jump + Landing Simulation", rounds: 4, roundRest: 35, exercises: [
        E("Squat Jump", 30, 10,
          "Touch and go — quick feet means better skating transfer. Think fast, not high.",
          "Weight falls back on landing — lower jump height, fix landing posture first."),
        E("Lateral Bound", 30, 10,
          "Each landing completely still before next jump. Stillness IS the training.",
          "Continuous bouncing without pausing — you must pause every landing."),
        E("Bosu Single-Leg Squat", 30, 10,
          "3-second controlled descent. Land on dome centre — do not fall off edge.",
          "Cannot control 3s descent — switch to floor single-leg squat without Bosu."),
        E("Split Jump", 30, 10,
          "Drive both arms up at takeoff. Land softly, slight knee bend. Alternate front leg.",
          "Landing stiff-legged — reduce jump height, find soft landing first.")
      ]},
      { name: "Circuit B — Core Finisher", rounds: 3, roundRest: 35, exercises: [
        ER("Single-Leg RDL", "8 reps each leg · sandbag in opposite hand", 12,
           "Hip hinge — NOT rounding back. Feel hamstring load at the bottom. Opposite arm reaches forward.",
           "Lower back rounds — drop to 5 reps, relearn hip hinge before adding reps."),
        ER("V-Up", "10 reps · controlled tempo", 12,
           "Legs and arms meet at the top simultaneously — no momentum or swing.",

  running: false, paused: false, abort: false, skipExercise: false,
  currentTimer: null, byRepsResolver: null,
  calmMode: false, currentEx: null, weather: null
};

const speech = window.speechSynthesis;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function speak(msg) {
  if (!speech) return;
  speech.cancel();
  const u = new SpeechSynthesisUtterance(msg);
  u.rate = 0.9;
  u.pitch = 1.05;
  speech.speak(u);
}

function beep(freq = 440, duration = 0.12) {
  if (!audioCtx || session.calmMode) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = "sine";
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function endBeep() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = "sine";
  osc.frequency.value = 700;
  const vol = session.calmMode ? 0.07 : 0.18;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

/* ============================================================
   WEATHER FETCH
   ============================================================ */

async function fetchRedDeerWeather() {
  try {
    const response = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=52.1833&longitude=-113.8&current=temperature_2m,weather_code,wind_speed_10m&timezone=America/Edmonton'
    );
    const data = await response.json();
    const curr = data.current;
    const desc = weatherDesc(curr.weather_code);
    return {
      temp: Math.round(curr.temperature_2m),
      desc: desc,
      wind: Math.round(curr.wind_speed_10m)
    };
  } catch (e) {
    console.error("Weather fetch failed:", e);
    return { temp: 0, desc: "Unknown", wind: 0 };
  }
}

function weatherDesc(code) {
  if (code <= 1) return "clear or partly cloudy";
  if (code <= 3) return "cloudy";
  if (code <= 48) return "clear or misty";
  if (code <= 67) return "light rain";
  if (code <= 77) return "rain or snow";
  if (code <= 82) return "heavy rain";
  if (code <= 86) return "snow showers";
  return "mixed conditions";
}

async function closeModal() {
  ensureAudio();
  
  // Hide modal, show page
  document.getElementById("modal-overlay").classList.remove("show");
  document.getElementById("page-content").classList.add("show");
  
  // Fetch weather
  session.weather = await fetchRedDeerWeather();
  
  // Render the day's brief
  renderTabs();
  renderSchedule();
  renderCard();
  
  // Play greeting BEFORE the brief appears
  const data = PLAN[selectedDay];
  
  if (data.restDay) {
    await speakAndWait(`Hi Jen! Today is ${DAY_LONG[DAY_KEYS.indexOf(selectedDay)]}, your rest day. Recovery is the training.`);
    return;
  }
  
  // Weather greeting
  const w = session.weather;
  const weatherMsg = `Red Deer is ${w.temp} degrees and ${w.desc}.`;
  await speakAndWait(`Hi Jen! Another great day to work with you. ${weatherMsg}.`);
  
  // Equipment
  const eqMsg = `Here's the equipment we'll need: ${data.equipment.join(", ")}.`;
  await speakAndWait(eqMsg);
  
  // Exercise list with circuit structure (NO warm-up mentioned here)
  let circuitMsg = "While you move the gear in place, here's today's exercise list. ";
  for (let ci = 0; ci < data.circuits.length; ci++) {
    const circuit = data.circuits[ci];
    const exNames = circuit.exercises.map(e => e.name).join(", ");
    const roundsText = circuit.rounds > 1 ? `${circuit.rounds} rounds of` : "1 round of";
    
    // Determine if by-reps or timed
    const hasReps = circuit.exercises.filter(e => e.byReps).length;
    const hasTimed = circuit.exercises.filter(e => !e.byReps).length;
    
    let modeText = "";
    if (hasReps > 0 && hasTimed > 0) {
      modeText = " — mix of timed and by reps";
    } else if (hasReps === circuit.exercises.length) {
      modeText = " — by reps";
    } else {
      modeText = " — timed";
    }
    
    circuitMsg += `${roundsText} ${exNames}${modeText}. `;
  }
  await speakAndWait(circuitMsg);
}

// Helper: speak and wait for utterance to finish
function speakAndWait(msg) {
  return new Promise(resolve => {
    if (!speech) { resolve(); return; }
    speech.cancel();
    const u = new SpeechSynthesisUtterance(msg);
    u.rate = 0.9;
    u.pitch = 1.05;
    u.onend = () => {
      resolve();
    };
    u.onerror = () => {
      resolve();
    };
    speech.speak(u);
  });
}

/* ============================================================
   TIMER PRIMITIVES
   ============================================================ */

function countdown(seconds, opts = {}) {
  return new Promise(resolve => {
    let remaining = seconds;
    setTimer(remaining);
    session.currentTimer = setInterval(() => {
      if (session.abort)        { clearInterval(session.currentTimer); resolve("abort"); return; }
      if (session.skipExercise) { clearInterval(session.currentTimer); resolve("skip");  return; }
      if (session.paused) return;

      remaining--;
      const urgent = remaining <= 3 && remaining > 0;
      setTimer(Math.max(remaining, 0), urgent);
      if (opts.onTick) opts.onTick(remaining);

      if (remaining <= 3 && remaining > 0) beep(remaining === 1 ? 880 : 440, 0.1);
      if (remaining === 0) endBeep();

      if (remaining <= 0) { clearInterval(session.currentTimer); resolve("done"); }
    }, 1000);
  });
}

function waitForDone() {
  return new Promise(resolve => {
    session.byRepsResolver = resolve;
    setTimer("✓");
    setDoneControls();
    const watchdog = setInterval(() => {
      if (session.abort) {
        clearInterval(watchdog);
        if (session.byRepsResolver) { const r = session.byRepsResolver; session.byRepsResolver = null; r("abort"); }
      }
      if (session.skipExercise) {
        clearInterval(watchdog);
        if (session.byRepsResolver) { const r = session.byRepsResolver; session.byRepsResolver = null; r("skip"); }
      }
    }, 200);
  });
}

function sleep(ms) {
  return new Promise(resolve => {
    const start = Date.now();
    const id = setInterval(() => {
      if (session.abort)        { clearInterval(id); resolve("abort"); return; }
      if (session.skipExercise) { clearInterval(id); resolve("skip");  return; }
      if (session.paused) return;
      if (Date.now() - start >= ms) { clearInterval(id); resolve("done"); }
    }, 100);
  });
}

/* ============================================================
   SESSION FLOW
   ============================================================ */

async function startSession() {
  ensureAudio();
  if (session.running) return;
  const data = PLAN[selectedDay];
  session = {
    running: true, paused: false, abort: false, skipExercise: false,
    currentTimer: null, byRepsResolver: null,
    calmMode: !!data.isCalmDay, currentEx: null, weather: session.weather
  };

  renderSessionShell(data);
  setSessionControls();

  // Mantra
  setStatus("Let's go!");
  const firstEx = data.warmup ? data.warmup.name : data.circuits[0].exercises[0].name;
  setExercise({
    name: "Ready?",
    cue: `"${MANTRA}" — Starting with ${firstEx}.`
  });
  await speakAndWait(MANTRA + " Starting with " + firstEx + ".");
  const r1 = await sleep(2000);
  if (r1 === "abort") return finalize(false);

  // Warm-up (if exists)
  if (data.warmup) {
    setZone("warmup");
    setStatus("Warm-up");
    setProgress([{ text: "Movement Prep", phase: true }, { text: "3 min" }]);
    setExercise({ name: "Movement Prep", warmupSteps: data.warmup.steps });
    setUpNext(`<span class="label">Up next:</span> <span class="name">${data.circuits[0].name}</span>`);
    
    await runWarmupCueing(data.warmup);
    
    // Brief pause after warm-up before circuits
    await sleep(1000);
  } else {
    // No warm-up: just a 20s pause before first circuit
    setZone("warmup");
    setStatus("Get ready…");
    setExercise({ name: "Almost time", cue: "Get your gear ready. First exercise starts in 20 seconds." });
    await speakAndWait("Twenty seconds until first circuit exercise.");
    await countdown(20);
  }

  // Circuits
  for (let ci = 0; ci < data.circuits.length; ci++) {
    const circuit = data.circuits[ci];

    for (let r = 1; r <= circuit.rounds; r++) {
      for (let ei = 0; ei < circuit.exercises.length; ei++) {
        const ex = circuit.exercises[ei];
        session.skipExercise = false;
        session.currentEx = ex;

        // ---------- WORK ----------
        setZone("work");
        setStatus(circuit.name);
        setProgress([
          { text: `Round ${r}/${circuit.rounds}`, phase: true },
          { text: `Exercise ${ei + 1}/${circuit.exercises.length}` }
        ]);

        const detail = ex.byReps
          ? ex.repsDetail
          : (ex.eachSide ? `${Math.floor(ex.work/2)}s each side` : `${ex.work}s`);

        setExercise({ name: ex.name, detail, cue: ex.cue });

        const next = nextLabel(data, ci, r, ei);
        setUpNext(next ? `<span class="label">Up next:</span> <span class="name">${next}</span>` : "");

        if (ex.byReps) {
          speak(ex.name + ". " + ex.repsDetail + ". Go.");
          const result = await waitForDone();
          if (result === "abort") return finalize(false);
          setSessionControls();
        } else {
          setTimer(ex.work);
          speak(ex.name + ". Three, two, one, go.");
          const r2 = await sleep(2200);
          if (r2 === "abort") return finalize(false);

          if (ex.eachSide) {
            const half = Math.floor(ex.work / 2);
            const r3 = await countdown(half);
            if (r3 === "abort") return finalize(false);

            if (r3 !== "skip") {
              setZone("sideswitch");
              setStatus("Switch sides");
              setExercise({
                name: "Switch sides",
                cue: `Reposition for the other side. ${ex.name} continues.`
              });
              speak("Switch sides. Take five seconds to reposition.");
              const r4 = await countdown(SIDE_SWITCH_BUFFER);
              if (r4 === "abort") return finalize(false);

              if (r4 !== "skip") {
                setZone("work");
                setStatus(circuit.name);
                setExercise({ name: ex.name, detail: `${half}s second side`, cue: ex.cue });
                speak(ex.name + " second side. Three, two, one, go.");
                const r5a = await sleep(2200);
                if (r5a === "abort") return finalize(false);
                const r5 = await countdown(half);
                if (r5 === "abort") return finalize(false);
              }
            }
          } else {
            const r6 = await countdown(ex.work);
            if (r6 === "abort") return finalize(false);
          }
        }

        // ---------- REST ----------
        const isFinalEx =
          ci === data.circuits.length - 1 &&
          r === circuit.rounds &&
          ei === circuit.exercises.length - 1;

        if (!isFinalEx) {
          const upcoming = nextLabel(data, ci, r, ei);
          const upcomingEx = nextExercise(data, ci, r, ei);
          const isLastOfRound = ei === circuit.exercises.length - 1;
          const isLastRound = r === circuit.rounds;
          const isLastCircuit = ci === data.circuits.length - 1;

          if (isLastOfRound && !(isLastRound && isLastCircuit)) {
            // Round rest
            setZone("roundrest");
            setStatus("Round rest");
            const nextLabelText = isLastRound ? data.circuits[ci + 1].name : `Round ${r + 1}`;

            const roundProgress = r < circuit.rounds
              ? `Round ${r} done! You got ${circuit.rounds - r} more to crush!`
              : `${circuit.name} complete! Time to bring the fire to the next one!`;

            setExercise({ name: "Round Rest", cue: roundProgress, hydrate: true });
            setUpNext(`<span class="label">Up next:</span> <span class="name">${nextLabelText}</span>`);
            speak(roundProgress);

            const leadTime = upcomingEx && HARD_EXERCISES.has(upcomingEx.name) ? 8 : 5;
            const result = await countdown(circuit.roundRest, {
              onTick: (rem) => {
                if (rem === leadTime && upcomingEx) speak("Get ready for " + upcomingEx.name);
              }
            });
            if (result === "abort") return finalize(false);
          } else {
            // Inter-exercise rest
            const restDuration = Math.max(ex.rest, MIN_REST);
            setZone("rest");
            setStatus("Rest");
            setExercise({
              name: "Rest",
              cue: "Breathe and reset.",
              redFlag: upcomingEx ? upcomingEx.redFlag : null
            });
            setUpNext(`<span class="label">Up next:</span> <span class="name">${upcoming}</span>`);

            speak("Rest.");
            const leadTime = upcomingEx && HARD_EXERCISES.has(upcomingEx.name) ? 8 : 5;
            const result = await countdown(restDuration, {
              onTick: (rem) => {
                if (rem === leadTime) speak("Up next: " + upcoming);
              }
            });
            if (result === "abort") return finalize(false);
          }
        }
      }
    }
  }

  finalize(true);
}

function nextLabel(data, ci, r, ei) {
  const circuit = data.circuits[ci];
  if (ei + 1 < circuit.exercises.length) return circuit.exercises[ei + 1].name;
  if (r + 1 <= circuit.rounds) return circuit.exercises[0].name + ` (Round ${r + 1})`;
  if (ci + 1 < data.circuits.length) return data.circuits[ci + 1].exercises[0].name;
  return null;
}

function nextExercise(data, ci, r, ei) {
  const circuit = data.circuits[ci];
  if (ei + 1 < circuit.exercises.length) return circuit.exercises[ei + 1];
  if (r + 1 <= circuit.rounds) return circuit.exercises[0];
  if (ci + 1 < data.circuits.length) return data.circuits[ci + 1].exercises[0];
  return null;
}

/* ============================================================
   CONTROL ACTIONS
   ============================================================ */

function togglePause() {
  session.paused = !session.paused;
  const btn = document.getElementById("btn-pause");
  if (btn) btn.textContent = session.paused ? "RESUME" : "PAUSE";
  speak(session.paused ? "Paused." : "Resuming.");
}

function formCheck() {
  if (!session.currentEx) return;
  const ex = session.currentEx;
  const wasPaused = session.paused;
  if (!wasPaused) togglePause();
  let msg = ex.name + ". " + ex.cue;
  if (ex.redFlag) msg += " Watch out: " + ex.redFlag;
  speak(msg);
}

function skipExercise() {
  if (!confirm("Skip this exercise and move on?")) return;
  session.skipExercise = true;
  if (session.byRepsResolver) {
    const r = session.byRepsResolver;
    session.byRepsResolver = null;
    r("skip");
  }
  speak("Skipping. Moving on.");
}

function stopSession() {
  if (!confirm("Stop the whole session?")) return;
  session.abort = true;
  if (session.byRepsResolver) {
    const r = session.byRepsResolver;
    session.byRepsResolver = null;
    r("abort");
  }
  speak("Session stopped.");
}

/* ============================================================
   FINALIZATION
   ============================================================ */

function finalize(completed) {
  if (session.currentTimer) clearInterval(session.currentTimer);
  session.running = false;
  session.paused = false;
  session.abort = false;

  if (completed) {
    setZone("");
    setStatus("Training complete 🎉");
    setTimer("✓");
    setExercise({
      name: "Done, Jen!",
      cue: "Great work out there. Sip water, breathe, walk it off for a minute."
    });
    setUpNext("");
    speak("Training complete. Fantastic effort.");
    showReflection();
  } else {
    setZone("");
    setStatus("Stopped — tap START to try again");
    setExercise({ name: "Stopped", cue: "Come back when you're ready." });
    setUpNext("");
    document.getElementById("controls").innerHTML =
      `<button class="btn btn-primary" id="btn-start">START AGAIN</button>`;
    document.getElementById("btn-start").onclick = () => renderCard();
  }
}

function showReflection() {
  document.getElementById("controls").innerHTML = `
    <div style="flex: 1 1 100%;">
      <div class="reflect">
        <h3>How did that feel?</h3>
        <div style="font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--ink-light);">
          Just for you to notice — nothing is saved.
        </div>
        <div class="reflect-buttons">
          <button data-feel="easy">Easy</button>
          <button data-feel="just">Just right</button>
          <button data-feel="hard">Hard</button>
        </div>
        <div id="reflect-thanks" class="reflect-thanks" style="display:none;"></div>
        <div style="margin-top: 1rem;">
          <button class="btn btn-primary" id="btn-restart">DONE</button>
        </div>
      </div>
    </div>`;
  const messages = {
    easy: "Noted — push a bit more next time. You got more in the tank!",
    just: "Perfect zone. That's where the magic happens.",
    hard: "Honest work right there. Tomorrow's body will thank today's effort."
  };
  document.querySelectorAll(".reflect-buttons button").forEach(btn => {
    btn.onclick = () => {
      const t = document.getElementById("reflect-thanks");
      t.textContent = messages[btn.dataset.feel];
      t.style.display = "block";
    };
  });
  document.getElementById("btn-restart").onclick = () => renderCard();
}

/* ============================================================
   INIT
   ============================================================ */

function init() {
  initModal();
}

init();
</script>
